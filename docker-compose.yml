# Local-dev compose — Phase A.2. Postgres is now active; alembic owns the schema.
#
# Usage:
#   cp .env.compose.template .env.compose   # or edit .env.compose
#   docker compose --env-file .env.compose up --build
#
# Bot and dashboard hit Postgres. The bot runs `alembic upgrade head` at
# startup, then `python main.py`. Dashboard waits for the schema to exist.
#
# NOTE: container shares the same Alpaca paper account as the live launchd bot.
# On weekends (market closed) there is no collision; on weekdays, stop the
# Mac launchd bot before testing cycles here.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5433:5432"   # 5433 to avoid clash with any local Postgres on 5432
    volumes:
      - trader_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    command:
      - sh
      - -c
      - "alembic upgrade head && python main.py"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trader
      DISABLE_KEYCHAIN: "1"
      TRADE_MODE: "${TRADE_MODE:-aggressive}"
      ALPACA_API_KEY: "${ALPACA_API_KEY:-}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY:-}"
      ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      NEWSAPI_KEY: "${NEWSAPI_KEY:-}"
      STOCK_NEWS_API_KEY: "${STOCK_NEWS_API_KEY:-}"
      ALPHA_VANTAGE_API_KEY: "${ALPHA_VANTAGE_API_KEY:-}"

  dashboard:
    build: .
    command:
      - sh
      - -c
      - >-
        until python -c "from utils import db_engine; db_engine.get_conn('').close()" 2>/dev/null;
        do echo 'waiting for postgres schema...'; sleep 2; done;
        streamlit run dashboard.py
        --server.port=8501 --server.address=0.0.0.0
        --server.headless=true --browser.gatherUsageStats=false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8502:8501"   # avoids clash with live Mac dashboard on 8501
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trader
      DISABLE_KEYCHAIN: "1"

volumes:
  trader_pgdata:
